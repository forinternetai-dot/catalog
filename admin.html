<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WALLI — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== NAV 1 (admin) ===== -->
  <header id="nav1">
    <div id="logo">WALL<em>I</em> <span style="font-size:14px;font-weight:400;color:var(--sand);margin-left:10px;">Admin</span></div>
    <div class="nav1-actions">
      <a href="./index.html" class="n1-btn" style="text-decoration:none;">🏠 Bosh sahifa</a>
      <button class="n1-btn sand" id="theme-btn">🌙</button>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="container" style="padding-top:40px;padding-bottom:80px;">
    <div class="sec-head">
      <div class="sec-head-left">
        <div class="sec-label">Boshqaruv</div>
        <h2 class="sec-title">Mahsulot <em>Boshqaruvi</em></h2>
        <div class="sec-count" id="admin-count">0 ta mahsulot</div>
      </div>
      <button class="btn-sand" style="width:auto;padding:12px 28px;" onclick="openAddProduct()">➕ Yangi mahsulot</button>
    </div>

    <!-- Filter va qidiruv -->
    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px;">
      <input type="text" id="admin-search" placeholder="Mahsulot nomi bo‘yicha qidirish..." style="flex:1;min-width:200px;padding:10px 16px;border-radius:99px;border:1.5px solid var(--line);background:var(--bg2);color:var(--text);">
      <select id="admin-type-filter" style="padding:10px 16px;border-radius:99px;border:1.5px solid var(--line);background:var(--bg2);color:var(--text);">
        <option value="">Barcha turlar</option>
      </select>
    </div>

    <!-- Jadval -->
    <div style="overflow-x:auto;border-radius:var(--r-lg);border:1px solid var(--line);background:var(--surface);">
      <table style="width:100%;border-collapse:collapse;font-size:14px;">
        <thead style="background:var(--bg2);border-bottom:2px solid var(--line);">
          <tr>
            <th style="padding:12px 16px;text-align:left;">Rasm</th>
            <th style="padding:12px 16px;text-align:left;">Nomi</th>
            <th style="padding:12px 16px;text-align:left;">Tur</th>
            <th style="padding:12px 16px;text-align:left;">Narx (so‘m)</th>
            <th style="padding:12px 16px;text-align:center;">Amallar</th>
          </tr>
        </thead>
        <tbody id="admin-table-body">
          <!-- JS orqali to‘ldiriladi -->
        </tbody>
      </table>
    </div>
    <div id="admin-no-results" style="display:none;text-align:center;padding:40px 0;color:var(--text3);">
      Hech qanday mahsulot topilmadi.
    </div>
  </div>

  <!-- ===== MODAL: Mahsulot qo‘shish/tahrirlash ===== -->
  <div class="modal-backdrop" id="mod-product">
    <div class="modal">
      <div class="modal-hd">
        <h2 id="product-modal-title">Yangi mahsulot</h2>
        <button class="modal-x" data-close="mod-product">✕</button>
      </div>
      <div class="modal-bd">
        <form id="product-form" onsubmit="saveProduct(event)">
          <input type="hidden" id="edit-id" value="">

          <div class="fg">
            <label>Mahsulot nomi</label>
            <input type="text" id="p-name" placeholder="Mas: 3D №1" required>
          </div>

          <div class="fg">
            <label>Tur</label>
            <select id="p-type" required></select>
          </div>

          <div class="fg">
            <label>Motif</label>
            <select id="p-motif">
              <option value="Animals">Animals</option>
              <option value="Botanical">Botanical</option>
              <option value="Abstract">Abstract</option>
              <option value="Geometric">Geometric</option>
              <option value="Floral">Floral</option>
              <option value="Textured">Textured</option>
            </select>
          </div>

          <div class="fg">
            <label>Style</label>
            <select id="p-style">
              <option value="Minimalist">Minimalist</option>
              <option value="Bohemian">Bohemian</option>
              <option value="Scandinavian">Scandinavian</option>
              <option value="Industrial">Industrial</option>
              <option value="Classic">Classic</option>
              <option value="Modern">Modern</option>
            </select>
          </div>

          <div class="fg">
            <label>Color</label>
            <select id="p-color">
              <option value="Red">Red</option>
              <option value="Blue">Blue</option>
              <option value="Green">Green</option>
              <option value="Beige">Beige</option>
              <option value="Yellow">Yellow</option>
              <option value="Pink">Pink</option>
              <option value="Black">Black</option>
              <option value="White">White</option>
            </select>
          </div>

          <div class="fg">
            <label>Room</label>
            <select id="p-room">
              <option value="Living Room">Living Room</option>
              <option value="Bedroom">Bedroom</option>
              <option value="Kitchen">Kitchen</option>
              <option value="Bathroom">Bathroom</option>
              <option value="Office">Office</option>
            </select>
          </div>

          <div class="fg">
            <label>Narx (so‘m)</label>
            <input type="number" id="p-price" placeholder="120000" required>
          </div>

          <div class="fg">
            <label>Tavsif</label>
            <input type="text" id="p-desc" placeholder="Qisqa tavsif" value="Yuqori sifatli devor qog'ozi">
          </div>

          <div class="fg">
            <label>Rasm URL (ixtiyoriy)</label>
            <input type="text" id="p-image" placeholder="https://... yoki bo'sh qoldiring">
          </div>

          <div style="display:flex;gap:12px;margin-top:8px;">
            <button type="submit" class="btn-sand">💾 Saqlash</button>
            <button type="button" class="btn-outline" onclick="closeModal('mod-product')">Bekor qilish</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
